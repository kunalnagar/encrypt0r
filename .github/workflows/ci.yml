name: Continuous Integration

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*.*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Get node version
        id: node
        run: echo "::set-output name=version::$(node -v)"
      - name: Get node_modules cache
        uses: actions/cache@v4
        id: node_modules
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}-${{ steps.node.outputs.version }}
      - name: Install dependencies
        run: yarn install
      - name: Lint
        run: yarn lint
      - name: Typecheck
        run: yarn typecheck
      - name: Install windows dependencies
        run: |
          sudo dpkg --add-architecture i386
          wget -qO - https://dl.winehq.org/wine-builds/winehq.key | sudo apt-key add -
          sudo add-apt-repository ppa:cybermax-dexter/sdl2-backport
          sudo apt-add-repository "deb https://dl.winehq.org/wine-builds/ubuntu $(lsb_release -cs) main"
          sudo apt install --install-recommends winehq-stable
          sudo ln -sf /usr/bin/wine /usr/bin/wine64
      - name: Create build
        run: yarn build
      - name: Package (linux + win)
        run: yarn electron-builder --linux --win --publish never
      - name: List release files
        run: ls -al release-builds
      - name: Smoke-test the release's npm version bump
        # semantic-release --dry-run skips the prepare step, so it never calls
        # `npm version`. Crucially, that call runs via node_modules/.bin/npm
        # (yarn puts it on PATH), NOT the system npm — so we invoke that exact
        # binary here to catch a broken bundled npm (e.g. the yallist@5
        # "Yallist is not a constructor" crash) before it reaches cd.yml.
        run: ./node_modules/.bin/npm version $(node -p "require('./package.json').version") --no-git-tag-version --allow-same-version
      - name: Release (dry-run)
        run: yarn release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
