name: Continuous Deployment (Upload)

on:
  release:
    types: [released]

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_flags: --mac --win
          - os: ubuntu-22.04
            build_flags: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Get node version
        id: node
        run: echo "::set-output name=version::$(node -v)"
      - name: Get node_modules cache
        uses: actions/cache@v4
        id: node_modules
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}-${{ steps.node.outputs.version }}
      - name: Install dependencies
        run: yarn install
      - name: Create release files
        run: yarn build && electron-builder ${{ matrix.build_flags }} --publish never
      - name: Rename artifacts (mac + win)
        if: runner.os == 'macOS'
        run: |
          mv release-builds/encrypt0r-mac-x64.zip release-builds/encrypt0r-mac.zip
          mv release-builds/encrypt0r-mac-arm64.zip release-builds/encrypt0r-mac-m1.zip
          mv release-builds/encrypt0r-windows-ia32.zip release-builds/encrypt0r-windows-x86.zip
      - name: Zip linux deb
        if: runner.os == 'Linux'
        run: zip -j release-builds/encrypt0r-linux-deb.zip release-builds/*.deb
      - name: Upload release files
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release-builds/*.zip
          tag: ${{ github.ref }}
          file_glob: true
